services:
  postgres:
    image: postgres:14-alpine
    container_name: postgres
    restart: unless-stopped
    volumes:
      - ./configuration/postgresql/initdb:/docker-entrypoint-initdb.d
      - postgresqldata:/var/lib/postgresql/data
    environment:
      - POSTGRES_USER=root
      - POSTGRES_PASSWORD=root
      - POSTGRES_DB=chirpstack

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --save 300 1 --save 60 100 --appendonly no
    volumes:
      - redisdata:/data

  mosquitto:
    image: eclipse-mosquitto:2
    restart: unless-stopped
    ports:
      - "1883:1883"
    volumes:
      - ./configuration/mosquitto/config/:/mosquitto/config/

  chirpstack:
    image: chirpstack/chirpstack:4
    command: -c /etc/chirpstack
    restart: unless-stopped
    volumes:
      - ./configuration/chirpstack:/etc/chirpstack
    depends_on:
      - postgres
      - mosquitto
      - redis
    environment:
      - MQTT_BROKER_HOST=mosquitto
      - REDIS_HOST=redis
      - POSTGRESQL_HOST=postgres
    ports:
      - "8080:8080"

  chirpstack-gateway-bridge:
    image: chirpstack/chirpstack-gateway-bridge:4
    restart: unless-stopped
    ports:
      - "1700:1700/udp"
    volumes:
      - ./configuration/chirpstack-gateway-bridge:/etc/chirpstack-gateway-bridge
    environment:
      - INTEGRATION__MQTT__EVENT_TOPIC_TEMPLATE=eu868/gateway/{{ .GatewayID }}/event/{{ .EventType }}
      - INTEGRATION__MQTT__STATE_TOPIC_TEMPLATE=eu868/gateway/{{ .GatewayID }}/state/{{ .StateType }}
      - INTEGRATION__MQTT__COMMAND_TOPIC_TEMPLATE=eu868/gateway/{{ .GatewayID }}/command/#
    depends_on:
      - mosquitto

  chirpstack-gateway-bridge-basicstation:
    image: chirpstack/chirpstack-gateway-bridge:4
    restart: unless-stopped
    command: -c /etc/chirpstack-gateway-bridge/chirpstack-gateway-bridge-basicstation-eu868.toml
    ports:
      - "3001:3001"
    volumes:
      - ./configuration/chirpstack-gateway-bridge:/etc/chirpstack-gateway-bridge
    depends_on:
      - mosquitto

  chirpstack-rest-api:
    image: chirpstack/chirpstack-rest-api:4
    restart: unless-stopped
    command: --server chirpstack:8080 --bind 0.0.0.0:8090 --insecure
    ports:
      - "8090:8090"
    depends_on:
      - chirpstack

  homeassistant:
    container_name: homeassistant
    image: homeassistant/home-assistant:latest
    ports:
      - "8123:8123/tcp"
    environment:
      TZ: 'Europe/Paris'
    volumes:
      - './homeassistant/config:/config'
      - '/run/dbus:/run/dbus:ro'
    restart: unless-stopped
    networks:
      - pihole_network

  pihole:
    container_name: pihole
    image: pihole/pihole:latest
    ports:
      - "53:53/tcp"
      - "53:53/udp"
      - "80:80/tcp"
      - "443:443/tcp"
    environment:
      TZ: 'Europe/Paris'
      WEBPASSWORD: 'AaA111'
      PIHOLE_API_KEY: 'auto'
      PIHOLE_WEBUI_BOXEDLAYOUT: 'traditional'
      FTLCONF_dhcp_hosts: |-
        14:b5:cd:a5:fe:bb,192.168.1.67,PCSimoTESTDOCKER
        dc:a6:32:2e:f7:61,192.168.1.2,PI
        2c:f7:f1:1c:b4:e8,192.168.1.49,gateway-eth
        20:97:27:2E:C1:0A,192.168.1.3,tap
    volumes:
      - './etc-pihole/:/etc/pihole/'
      - './etc-dnsmasq.d/:/etc/dnsmasq.d/'
    cap_add:
      - NET_ADMIN
    restart: unless-stopped
    network_mode: host

  smtp4dev:
    image: rnwood/smtp4dev:v3
    container_name: smtp4dev
    ports:
      - "5001:80"  # Interface web accessible sur http://localhost:5001
      - "2525:25"  # Port SMTP mappé sur l'hôte (optionnel, pour tests directs)
    volumes:
      - ./GYSMO-CONFIG/data/smtp4dev:/smtp4dev  # Persistance des emails capturés (optionnel)
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80"]  # Vérifie que l'UI est up
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  gysmo:
    build: ./GYSMO-CONFIG/app
    container_name: gysmo
    working_dir: /app
    volumes:
      - ./GYSMO-CONFIG/app:/app
      - ./GYSMO-CONFIG/data/python:/app/data
      - ./GYSMO-CONFIG/.env:/app/.env:ro
      - ./GYSMO-CONFIG/plugins.yaml:/app/plugins.yaml:ro
    depends_on:
      mosquitto:
        condition: service_started  # Attends Mosquitto (comme avant)
      smtp4dev:
        condition: service_healthy  # Rend smtp4dev obligatoire et attend qu'il soit prêt

    environment:
      - FLASK_ENV=production
      - PYTHONUNBUFFERED=1
      - PYDEVD_DISABLE_FILE_VALIDATION=1  # Désactive la validation pydevd pour supprimer l'avertissement
    ports:
      - "8888:8080"
    command: python -X frozen_modules=off gysmo.py


volumes:
  postgresqldata:
  redisdata:

networks:
  pihole_network:
    driver: bridge
